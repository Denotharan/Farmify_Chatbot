- - What equipment can we use in Groundnut farming?
  - We can use the Khedut Tractor Operated Groundnut Digger in groundnut farming.

- - What is the use of a potato planter?
  - Potato planter is a farm equipment used for sowing potatoes.

- - Which are the popular rice transplanters?
  - Yanmar VP6D, Mahindra Rice Transplanter MP-46 and others are the popular rice transplanters.

- - Why is agriculture important?
  - Agriculture is not only a source of production but also includes distribution and promotion of produced material. Moreover, it contributes to national revenue.

- - What do farmers keep in mind while growing their crops?
  - For growing crops, they make sure soil, weather condition, cultivation knowledge, and natural requirements like water, air, electricity, and others.

- - What is dual PTO in a tractor?
  - When a PTO can run on 540 RPM and 1000 RPM both, then it is called dual PTO.

- - How frequent should you service your tractor?
  - Tractor manufacturers recommend servicing the engine after every 100 hours, and transmission after every 300 hours.

- - What is wheelbase in a tractor?
  - Wheelbase refers to the horizontal distance between the centers of the front and rear wheels in a tractor.

- - What is the clutch in a tractor?
  - Clutch in a tractor is a device used to engage & disengage the tractor engine with drive wheels and transmission gears.
